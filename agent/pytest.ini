[pytest]
# The agent modules (main, transcriber, summarizer, exporter) live at the
# root of agent/, and the tests import them as top-level modules. `pythonpath = .`
# puts agent/ (the rootdir) on sys.path so this works under a bare `pytest`
# invocation too — not just `python -m pytest` (which adds cwd implicitly).
pythonpath = .
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
