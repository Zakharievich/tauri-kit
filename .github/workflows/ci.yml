name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-and-test-frontend:
    name: Lint & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            server/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test

  lint-and-test-server:
    name: Lint & Test Token Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: Type check / build
        run: pnpm build

      - name: Test
        run: pnpm test

  test-rust:

    name: Test & Lint Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  lint-agent:
    name: Lint Python Agent (optional component)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Byte-compile check
        run: python -m py_compile main.py transcriber.py summarizer.py exporter.py

      - name: Test
        run: pytest

  build-tauri:

    name: Build Tauri App
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-test-frontend, lint-and-test-server, test-rust]

    permissions:
      contents: write # required to attach assets to the GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          # `label` becomes the human-readable platform (+arch) part of the
          # artifact name. NOTE: macos-latest is an Apple Silicon runner, so the
          # DMG is arm64-only — hence `macOS_arm64` (honest, not hidden). To ship
          # a single `macOS` DMG for both arches, build `universal-apple-darwin`
          # instead (heavier CI, needs both toolchains).
          - platform: ubuntu-latest
            label: Linux_x64
            bundle: appimage
            ext: AppImage
          - platform: windows-latest
            label: Windows_x64
            bundle: nsis
            ext: exe
          - platform: macos-latest
            label: macOS_arm64
            bundle: dmg
            ext: dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Rename bundle to versioned, platform-named artifact
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"                # e.g. v1.0.6
          DIR="src-tauri/target/release/bundle/${{ matrix.bundle }}"
          SRC="$(ls "$DIR"/*.${{ matrix.ext }} | head -n1)"
          DEST="$DIR/TauriKit_${TAG}_${{ matrix.label }}.${{ matrix.ext }}"
          mv "$SRC" "$DEST"
          echo "ASSET=$DEST" >> "$GITHUB_ENV"
          echo "Renamed $SRC -> $DEST"

      - name: Publish artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'TauriKit ${{ github.ref_name }}'
          body: 'See the assets to download and run this version.'
          draft: false
          prerelease: false
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
